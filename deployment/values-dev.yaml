apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-dev
  template:
    metadata:
      labels:
        app: demo-dev
    spec:
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          ports:
            - containerPort: 80